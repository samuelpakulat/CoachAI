name: Daily Job Tracker

# Runs the job tracker automatically in the cloud -- no PC needed.
# Results are saved to job_tracker/jobs.csv (committed back to the repo so you
# can view them on GitHub, including from your phone).

on:
  schedule:
    - cron: "0 13 * * *"   # every day ~09:00 Eastern (13:00 UTC)
  workflow_dispatch: {}     # adds a manual "Run workflow" button

permissions:
  contents: write           # allow committing the updated jobs.csv

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: job_tracker
        run: pip install -r requirements.txt

      - name: Run job tracker
        working-directory: job_tracker
        env:
          # Email is sent only if you add a JOB_TRACKER_EMAIL_PASSWORD secret;
          # otherwise the script just updates the CSV and skips email.
          EMAIL_ENABLED: "true"
          JOB_TRACKER_EMAIL_PASSWORD: ${{ secrets.JOB_TRACKER_EMAIL_PASSWORD }}
          # Optional Adzuna keys (add as repo secrets to enable that source).
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: python job_tracker.py

      - name: Commit new jobs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add job_tracker/jobs.csv job_tracker/JOBS.md
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update job list ($(date -u +%Y-%m-%d))"
            git push
          fi
